# GitHub Actions: 自动打包分发
#
# 触发条件：推送 v* tag（如 v0.4.0）
# 构建 macOS 和 Windows 产物并发布到 GitHub Releases
#
# 所需 GitHub Secrets（macOS 签名/公证，可选）:
# - MAC_CERTS: Base64 编码的 macOS Developer ID Application 证书 (.p12)
# - MAC_CERTS_PASSWORD: 证书密码
# - APPLE_ID: Apple ID（公证用）
# - APPLE_APP_SPECIFIC_PASSWORD: App-Specific 密码（公证用）
# - APPLE_TEAM_ID: Apple Developer Team ID
# GITHUB_TOKEN 由 GitHub Actions 自动提供，无需手动配置

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64: Apple Silicon 产物
          - os: macos-latest
            platform: mac
            arch: arm64
            builder_arg: --arm64
          # macOS x64: Intel 产物
          - os: macos-15-intel
            platform: mac
            arch: x64
            builder_arg: --x64
          # Windows x64
          - os: windows-latest
            platform: win
            arch: x64
            builder_arg: --x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      # macOS 代码签名准备
      - name: 导入 macOS 签名证书
        if: matrix.platform == 'mac'
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          # 创建临时 keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 导入证书
          echo "$MAC_CERTS" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$MAC_CERTS_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          rm $RUNNER_TEMP/cert.p12

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      # 打包（不上传发布，避免并行竞态）
      - name: 打包 (macOS)
        if: matrix.platform == 'mac'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac ${{ matrix.builder_arg }}
        working-directory: apps/electron

      - name: 打包 (Windows)
        if: matrix.platform == 'win'
        run: npx electron-builder --win ${{ matrix.builder_arg }}
        working-directory: apps/electron

      # 上传产物为 workflow artifact
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: apps/electron/out/*
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 下载 macOS ARM64 产物
        uses: actions/download-artifact@v4
        with:
          name: build-mac-arm64
          path: artifacts/mac-arm64

      - name: 下载 macOS x64 产物
        uses: actions/download-artifact@v4
        with:
          name: build-mac-x64
          path: artifacts/mac-x64

      - name: 下载 Windows x64 产物
        uses: actions/download-artifact@v4
        with:
          name: build-win-x64
          path: artifacts/win-x64

      - name: 汇总产物并合并 latest-mac.yml
        run: |
          mkdir -p release

          # 拷贝 Windows 产物
          cp artifacts/win-x64/* release/

          # 拷贝 macOS 产物（排除 latest-mac.yml，稍后合并）
          cp artifacts/mac-x64/*.dmg artifacts/mac-x64/*.zip artifacts/mac-x64/*.zip.blockmap release/ 2>/dev/null || true
          cp artifacts/mac-arm64/*.dmg artifacts/mac-arm64/*.zip artifacts/mac-arm64/*.zip.blockmap release/ 2>/dev/null || true

          # 合并两份 latest-mac.yml
          pip install pyyaml -q
          python3 << 'PYEOF'
          import yaml

          with open('artifacts/mac-x64/latest-mac.yml') as f:
              x64 = yaml.safe_load(f)
          with open('artifacts/mac-arm64/latest-mac.yml') as f:
              arm64 = yaml.safe_load(f)

          files = []
          if 'files' in x64:
              files.extend(x64['files'])
          if 'files' in arm64:
              files.extend(arm64['files'])

          merged = dict(x64)
          merged['files'] = files

          with open('release/latest-mac.yml', 'w') as f:
              yaml.dump(merged, f, default_flow_style=False, allow_unicode=True)
          PYEOF

          echo "=== release/ 文件列表 ==="
          ls -la release/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
